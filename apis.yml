apis:
  - aid: ace-hardware:affiliate-program
    name: Ace Hardware Affiliate Program
    description: >-
      The Ace Hardware Affiliate Program allows digital publishers, bloggers, and
      content creators to earn commissions by referring customers to
      acehardware.com. The program is managed through Impact's affiliate network
      and provides access to product links, banners, and promotional resources.
      Affiliates can link to the full Ace Hardware product catalog covering
      hardware, tools, paint, outdoor power, and home improvement.
    humanURL: https://www.acehardware.com/affiliates
    baseURL: https://www.acehardware.com
    tags:
      - Affiliate
      - Commission
      - Publisher
      - Impact
    properties:
      - type: Documentation
        url: https://www.acehardware.com/affiliates
      - type: Documentation
        url: https://www.acehardware.com/affiliate-faq
        title: Affiliate Program FAQ
  - aid: ace-hardware:vendor-edi
    name: Ace Hardware Vendor EDI Integration
    description: >-
      Ace Hardware requires all vendors to exchange electronic data using X12
      EDI standards (version 4010) via AS2 connection through its vendor
      management portal at AceHardware-Vendors.com. Supported transaction sets
      include 850 (Purchase Order), 856 (Advanced Ship Notice), 810 (Invoice),
      820 (Payment/Remittance), and 864 (Text Message). Vendors must complete
      the Ace Hardware EDI Agreement and connect through an approved EDI
      service provider or the Logicbroker platform.
    humanURL: https://www.acehardware-vendors.com/
    baseURL: https://www.acehardware-vendors.com/
    tags:
      - EDI
      - Vendor
      - Supply Chain
      - X12
      - AS2
    properties:
      - type: Documentation
        url: https://www.acehardware-vendors.com/
      - type: Documentation
        url: https://www.stedi.com/edi/network/ace-hardware
        title: Ace Hardware EDI Guide (Stedi Network)
      - type: Documentation
        url: https://www.spscommerce.com/network/find-a-partner/view/ace-hardware/
        title: Ace Hardware EDI via SPS Commerce
  - aid: ace-hardware:retail-commerce
    name: Ace Hardware Retail Commerce
    description: >-
      Ace Hardware's online retail platform at acehardware.com offers customers
      the ability to shop for hardware, tools, paint, lawn and garden, and home
      improvement products with options for online ordering, store pickup, and
      delivery. The platform integrates with local store inventory across
      thousands of independently owned Ace Hardware locations.
    humanURL: https://www.acehardware.com/
    baseURL: https://www.acehardware.com/
    tags:
      - Retail
      - E-Commerce
      - Hardware
      - Home Improvement
    properties:
      - type: Documentation
        url: https://www.acehardware.com/
common:
  - type: Website
    url: https://www.acehardware.com
  - type: Portal
    url: https://www.acehardware.com/
  - type: PrivacyPolicy
    url: https://www.acehardware.com/privacy-policy
  - type: TermsOfService
    url: https://www.acehardware.com/legal-notices
  - type: Features
    data:
      - name: Retailer-Owned Cooperative Model
        description: >-
          Ace Hardware is owned by its member retailers, giving independent
          hardware store owners the purchasing power and brand recognition of a
          national chain while remaining locally owned.
      - name: Affiliate Commission Program
        description: >-
          Publishers earn commissions on referrals to acehardware.com, managed
          through the Impact affiliate network with access to product links and
          promotional banners.
      - name: Vendor EDI Integration
        description: >-
          Standardized X12 EDI (version 4010) via AS2 connection enables
          electronic purchase orders, invoices, ship notices, and payment
          remittance between Ace Hardware and its vendors.
      - name: Local Store Inventory
        description: >-
          Online shopping integrates with real-time local store inventory
          allowing buy online, pick up in store across thousands of locations.
      - name: Vendor Scorecard
        description: >-
          Ace Hardware maintains a vendor scorecard tracking supply chain
          compliance, on-time shipments, and EDI transaction accuracy.
  - type: UseCases
    data:
      - name: Affiliate Publisher Monetization
        description: >-
          Bloggers, home improvement content creators, and comparison shopping
          sites earn commissions by linking to Ace Hardware product pages.
      - name: Vendor Supply Chain Integration
        description: >-
          Hardware and home improvement manufacturers integrate their ERP and
          order management systems with Ace Hardware's EDI infrastructure.
      - name: Buy Online Pick Up In Store
        description: >-
          Customers browse acehardware.com and reserve products for same-day
          pickup at their local independently owned Ace Hardware store.
      - name: Drop Ship Vendor Programs
        description: >-
          Vendors ship products directly to Ace Hardware customers, integrated
          through EDI transaction sets for orders and ship notices.
  - type: Integrations
    data:
      - name: Impact Affiliate Network
        description: >-
          Ace Hardware's affiliate program runs on the Impact platform,
          providing tracking, reporting, and commission management for affiliates.
      - name: Logicbroker EDI Platform
        description: >-
          Logicbroker serves as Ace Hardware's EDI integration platform for
          vendor onboarding, transaction monitoring, and compliance management.
      - name: SPS Commerce
        description: >-
          SPS Commerce provides pre-built EDI connections for vendors wanting
          to become Ace Hardware-compliant suppliers.
      - name: RangeMe Vendor Discovery
        description: >-
          Ace Hardware uses RangeMe for new vendor applications and product
          discovery by category buyers.
      - name: Tradeshift
        description: >-
          Tradeshift provides invoice and payment processing integration for
          Ace Hardware's AP automation workflows.
